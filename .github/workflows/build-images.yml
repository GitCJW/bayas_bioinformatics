name: Build Docker images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Docker/core/**"
      - "Docker/rdeps/**"
      - "Docker/final/**"
      - "Docker/dep/**"
      - "BAYAS/**"
      - ".github/workflows/build-images.yml"

jobs:
  build-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/core/Dockerfile_core
          push: true
          tags: |
            drcjw/bayas_core:1.0.0
            drcjw/bayas_core:latest

  build-rdeps:
    runs-on: ubuntu-latest
    needs: build-core
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push rdeps image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/rdeps/Dockerfile_rdeps
          push: true
          tags: |
            drcjw/bayas_rdeps:1.0.0
            drcjw/bayas_rdeps:latest

  build-final:
    runs-on: ubuntu-latest
    needs: build-rdeps
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push final image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/final/Dockerfile
          push: true
          tags: |
            drcjw/bayas_final:1.0.0
            drcjw/bayas_final:latest
